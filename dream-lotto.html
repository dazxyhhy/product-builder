    <style>
      :root {
        /* Light Theme */
        --bg: #f4d03f;
        --primary: #a388ee;
        --secondary: #4dff88;
        --accent: #ff5db1;
        --white: #ffffff;
        --black: #000000;

        --shadow-hover: 4px 4px 0px 0px var(--shadow-color);

      [data-theme="dark"] {
        /* Dark Theme */
        --bg: #1a1a1a;
        --primary: #8a63f2;
        --secondary: #00ff66;
        --accent: #ff0080;
        --white: #2d2d2d;
        --black: #000000;
        --card-bg: #2d2d2d;
        --text: #ffffff;
        --border-color: #ffffff;
        --shadow-color: #ffffff;

        /* Ball Colors (Dark) */

        --ball-2: #d1b3ff;
        --ball-3: #ff85c1;
        --ball-4: #555;
        --ball-5: #69ff94;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        transition:
          background-color 0.3s,
          color 0.3s,
          border-color 0.3s,
          box-shadow 0.3s;
      }

      html,
      body {
        max-width: 100%;
        overflow-x: hidden;
        width: 100%;
      }

      body {
        background-color: var(--bg);
        font-family: "Space Grotesk", "Noto Sans KR", sans-serif;
        color: var(--text);
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
        position: relative;
        width: 100%;
      }

      /* === Floating Decorations === */
      .deco-container {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: -1;
        overflow: hidden;
      }

      .sticker {
        position: absolute;
        border: var(--border);
        box-shadow: 4px 4px 0px var(--shadow-color);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 1.5rem;
        background: var(--white);
        color: #000;
        animation: float infinite ease-in-out;
      }

      .s1 { width: 60px; height: 60px; background: var(--primary); top: 10%; left: 5%; border-radius: 50%; animation-duration: 8s; }
      .s2 { width: 120px; height: 50px; background: var(--secondary); top: 20%; right: 10%; transform: rotate(15deg); animation-duration: 10s; font-size: 1.2rem; }
      .s3 { width: 50px; height: 50px; background: var(--accent); bottom: 15%; left: 10%; transform: rotate(-10deg); animation-duration: 7s; }

      @keyframes float {
        0%, 100% { transform: translateY(0) rotate(0deg) scale(1); }
        50% { transform: translateY(-30px) rotate(10deg) scale(1.1); }
      }

      /* === Header === */
      .main-header {
        width: 100%;
        padding: 10px 40px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--card-bg);
        border-bottom: var(--border);
        position: sticky;
        top: 0;
        z-index: 1000;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      }

      .logo {
        font-family: "Outfit", sans-serif;
        font-weight: 900;
        font-size: 1.5rem;
        text-transform: uppercase;
        letter-spacing: -1px;
        background: var(--secondary);
        padding: 4px 12px;
        border: var(--border);
        box-shadow: 3px 3px 0px var(--shadow-color);
        text-decoration: none;
        color: #000;
      }

      .header-right { display: flex; align-items: center; gap: 30px; }
      .nav-menu { display: flex; gap: 20px; }
      .nav-item { font-weight: 700; text-decoration: none; color: var(--text); text-transform: uppercase; padding: 5px 10px; border: 2px solid transparent; font-size: 0.9rem; }
      .nav-item:hover { background: var(--accent); border: 2px solid var(--border-color); box-shadow: 3px 3px 0px var(--shadow-color); transform: translate(-2px, -2px); color: #000; }
      .theme-toggle { background: var(--primary); color: #000; border: var(--border); padding: 5px 12px; font-weight: 800; cursor: pointer; box-shadow: 3px 3px 0px var(--shadow-color); text-transform: uppercase; font-size: 0.75rem; }
      .menu-btn { display: none; background: var(--accent); color: #000; border: var(--border); padding: 5px 12px; font-size: 1.5rem; cursor: pointer; box-shadow: 4px 4px 0px var(--shadow-color); }

      /* === Mobile Drawer === */
      .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 2000; display: none; opacity: 0; transition: opacity 0.3s ease; }
      .drawer-overlay.active { display: block; opacity: 1; }
      .mobile-drawer { position: fixed; top: 0; right: -300px; width: 280px; height: 100%; background: var(--bg); border-left: var(--border); z-index: 2100; transition: right 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; padding: 30px; box-shadow: -10px 0px 0px var(--shadow-color); }
      .mobile-drawer.active { right: 0; }
      .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
      .close-btn { background: var(--accent); border: var(--border); width: 40px; height: 40px; font-size: 1.5rem; font-weight: 900; cursor: pointer; box-shadow: 4px 4px 0px var(--shadow-color); }
      .drawer-nav { display: flex; flex-direction: column; gap: 20px; }
      .drawer-item { font-family: "Outfit", sans-serif; font-weight: 900; font-size: 1.4rem; text-decoration: none; color: var(--text); text-transform: uppercase; padding: 10px 15px; border: var(--border); background: var(--white); box-shadow: 4px 4px 0px var(--shadow-color); }

      /* === Container === */
      .main-container {
        width: 100%;
        max-width: 1100px;
        padding: 30px 24px;
        display: flex;
        flex-direction: column;
        gap: 30px;
        flex: 1;
        justify-content: center;

      /* === Dream Section === */
      .dream-card {
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 20px;
        color: var(--text);
        max-width: 800px;

      h1 {
        font-family: "Outfit", sans-serif;

        font-size: clamp(2rem, 6vw, 3.5rem);

        text-transform: uppercase;
        background: var(--primary);
        padding: 15px 20px;
        border: var(--border);
        box-shadow: 4px 4px 0px var(--shadow-color);
        color: #000;
        min-height: auto;
        display: flex;
        align-items: center;
        overflow: visible;

      }

      .tagline {
        font-size: 1.2rem;
        font-weight: 700;
        background: var(--white);
        padding: 8px 15px;
        border: var(--border);
        box-shadow: 3px 3px 0px var(--shadow-color);
        display: inline-block;
        align-self: flex-start;
        color: var(--text);
      }

      .input-group { width: 100%; }
      input[type="text"] {
        width: 100%;
        padding: 15px;
        font-family: "Noto Sans KR", sans-serif;
        font-weight: 700;
        font-size: 1.1rem;
        border: var(--border);
        background: var(--white);
        color: var(--black);
        box-shadow: 3px 3px 0px var(--shadow-color);
        outline: none;
      }
      input[type="text"]:focus { transform: translate(-2px, -2px); box-shadow: 5px 5px 0px var(--shadow-color); }

      .btn {
        font-family: "Outfit", sans-serif;
        font-weight: 800;
        font-size: 1.1rem;
        padding: 12px 25px;
        text-transform: uppercase;
        cursor: pointer;
        border: var(--border);
        box-shadow: 6px 6px 0px 0px var(--shadow-color);
        transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: #000;
        background: var(--accent);
        width: 100%;
      }
      .btn:hover { transform: translate(-4px, -4px); box-shadow: 10px 10px 0px var(--shadow-color); }

      .result-area {
        margin-top: 10px;
        display: none;
        flex-direction: column;
        gap: 15px;
        animation: slideUp 0.5s ease-out forwards;
      }
      @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

      .balls-container {
        display: flex;
        gap: 8px;
        justify-content: center;
        flex-wrap: wrap;
      }

      .ball {
        width: 45px;
        height: 45px;
        border: var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        font-size: 1.2rem;
        background: var(--white);
        box-shadow: 3px 3px 0px var(--shadow-color);
        color: #000;
        animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      }
      @keyframes pop { from { transform: scale(0); } to { transform: scale(1); } }

      .ball-1 { background: var(--ball-1); }
      .ball-11 { background: var(--ball-2); }
      .ball-21 { background: var(--ball-3); }
      .ball-31 { background: var(--ball-4); }
      .ball-41 { background: var(--ball-5); }

      .interpretation {
        background: var(--secondary);
        border: var(--border);
        padding: 15px;
        font-weight: 800;
        font-size: 1rem;
        box-shadow: 4px 4px 0px var(--shadow-color);
        color: #000;
        line-height: 1.5;
      }

      /* === Footer === */
      footer { width: 100%; background: var(--black); color: var(--white); padding: 20px 40px; text-align: center; border-top: var(--border); margin-top: auto; }
      .footer-links { margin-bottom: 10px; }
      .footer-links a { color: white; text-decoration: none; margin: 0 10px; font-weight: 700; font-size: 0.8rem; }

      @media (max-width: 600px) {
        .main-header { padding: 10px 20px; }
        .nav-menu, .theme-toggle { display: none; }
        .menu-btn { display: block; }
        .dream-card { padding: 0; }
        h1 { font-size: 1.8rem; }
        .ball { width: 38px; height: 38px; font-size: 1rem; }
        .main-container { padding: 20px 16px; }
        footer { padding: 20px; }
      }

  <body>

        <button class="close-btn" id="closeBtn">×</button>
      </div>
      <nav class="drawer-nav">
        <a href="dream-lotto.html" class="drawer-item">🌙 DREAM LOTTO</a>
        <a href="animal-test.html" class="drawer-item">🐾 ANIMAL TEST</a>
        <a href="blog.html" class="drawer-item">📜 ARCHIVE</a>
        <a href="share-luck.html" class="drawer-item">💬 COMMUNITY</a>
      </nav>
    </div>

    <div class="main-container">
      <section class="dream-card">
        <h1>Dream Interpreter</h1>
        <p style="font-size: 1.1rem; font-weight: 700">당신의 꿈속 키워드를 입력하면 행운의 숫자로 변환해드립니다.</p>
        
        <div class="input-group">
          <input type="text" id="dreamInput" placeholder="예: 돼지, 불, 조상님, 뱀, 똥..." autocomplete="off" />
        </div>

        <button class="btn" id="convertBtn">운명의 숫자 확인하기</button>

        <div class="result-area" id="resultArea">
          <div class="balls-container" id="ballsContainer"></div>
          <div class="interpretation" id="interpretationText"></div>
        </div>
      </section>
    </div>

    <footer>
      <div class="footer-links">
        <a href="privacy.html">개인정보처리방침</a>
        <a href="contact.html">문의하기</a>
      </div>
      <p style="font-weight: 800; text-transform: uppercase; margin-top: 20px">© 2026 NEO LOTTO. ALL RIGHTS RESERVED.</p>
    </footer>

    <script>
      const dreamInput = document.getElementById("dreamInput")
      const convertBtn = document.getElementById("convertBtn")
      const resultArea = document.getElementById("resultArea")
      const ballsContainer = document.getElementById("ballsContainer")
      const interpretationText = document.getElementById("interpretationText")
      const themeToggle = document.getElementById("themeToggle")
      const menuBtn = document.getElementById("menuBtn")
      const closeBtn = document.getElementById("closeBtn")
      const mobileDrawer = document.getElementById("mobileDrawer")
      const overlay = document.getElementById("drawerOverlay")

      // Theme
      function updateThemeUI(dark) {
        document.documentElement.setAttribute("data-theme", dark ? "dark" : "light")
        themeToggle.textContent = dark ? "LIGHT MODE" : "DARK MODE"
      }
      themeToggle.addEventListener("click", () => {
        const isDark = document.documentElement.getAttribute("data-theme") !== "dark"
        updateThemeUI(isDark)
        localStorage.setItem("theme", isDark ? "dark" : "light")
      })
      const savedTheme = localStorage.getItem("theme")
      updateThemeUI(savedTheme === "dark")

      // Mobile Menu
      menuBtn.addEventListener("click", () => { mobileDrawer.classList.add("active"); overlay.classList.add("active"); })
      const closeMenu = () => { mobileDrawer.classList.remove("active"); overlay.classList.remove("active"); }
      closeBtn.addEventListener("click", closeMenu)
      overlay.addEventListener("click", closeMenu)

      // Conversion Logic
      function stringToSeed(str) {
        let hash = 0
        for (let i = 0; i < str.length; i++) {
          hash = (hash << 5) - hash + str.charCodeAt(i)
          hash |= 0
        }
        return Math.abs(hash)
      }
      function seededRandom(seed) {
        const x = Math.sin(seed++) * 10000
        return x - Math.floor(x)
      }
      function getBallClass(n) {
        if (n <= 10) return "ball-1"
        if (n <= 20) return "ball-11"
        if (n <= 30) return "ball-21"
        if (n <= 40) return "ball-31"
        return "ball-41"
      }

      const interpretations = [
        "당신의 꿈은 변화의 전조입니다. 이 숫자들이 새로운 길을 열어줄 것입니다.",
        "무의식이 당신에게 보내는 신호입니다. 직관을 믿으세요.",
        "강한 에너지의 흐름이 느껴지는 꿈입니다. 과감한 선택이 필요한 때입니다.",
        "오래된 인연이나 기억이 행운으로 연결될 징조입니다.",
        "안정과 평화를 상징하는 꿈입니다. 차분한 마음으로 결과를 기다리세요.",
      ]

      convertBtn.addEventListener("click", () => {
        const dream = dreamInput.value.trim()
        if (!dream) { alert("꿈의 내용을 입력해주세요."); return; }

        ballsContainer.innerHTML = ""
        resultArea.style.display = "flex"

        let seed = stringToSeed(dream)
        const nums = []
        while (nums.length < 6) {
          const rand = seededRandom(seed)
          const n = Math.floor(rand * 45) + 1
          if (!nums.includes(n)) nums.push(n)
          seed++
        }
        nums.sort((a, b) => a - b)

        nums.forEach((n, i) => {
          setTimeout(() => {
            const ball = document.createElement("div")
            ball.className = `ball ${getBallClass(n)}`
            ball.textContent = n
            ballsContainer.appendChild(ball)
          }, i * 150)
        })

        const interpIndex = stringToSeed(dream) % interpretations.length
        interpretationText.textContent = `"${dream}"... ${interpretations[interpIndex]}`
      })

      dreamInput.addEventListener("keypress", (e) => { if (e.key === "Enter") convertBtn.click() })
    </script>
